{% extends 'base.html' %}

{% block title %}{{ _('Login | Galerie') }}{% endblock %}

{% block content %}
<p id="passkey-loading">{{ _('Detecting Passkey availability...') }}</p>
<p id="passkey-unavailable" style="display: none;">{{ _('Passkey is unavailable. Please try with another browser or device.') }}</p>
<form id="passkey-form" style="display: none;">
    <p>{{ _('Please login first') }}</p>
    <p>{{ _('Username') }}</p>
    <input
        type="text"
        autocomplete="username"
        name="username"
        required
        class="code-font"
    >
    <br>
    <br>
    <button
        class="button"
        hx-swap="none"
        hx-post="/actions/passkey/generate_registration"
        hx-disabled-elt="this"
        hx-on::after-request="passkeyGenerateRegistrationCallback(event.detail.xhr.response)"
    >
        {{ _('Sign up') }} <span class="htmx-indicator">...</span>
    </button>
</form>
<script src="{{ url_for('static', filename='login.js') }}"></script>
{% endblock %}

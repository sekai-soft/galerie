name: galerie
services:
  # application
  galerie:
    image: ghcr.io/sekai-soft/galerie:latest
    container_name: galerie
    restart: unless-stopped
    environment:
      BASE_URL: 'https://galerie-reader.app'
      SQLALCHEMY_DATABASE_URI: 'postgresql://galerie:secret@galerie-postgres/galerie?sslmode=disable'
      MINIFLUX_BASE_URL: 'http://miniflux'
      NITTER_BASE_URL: 'http://nitter'
      MEDIA_PROXY_CUSTOM_URL: 'http://galerie-reader-media'
    env_file:
      - env
    network_mode: service:galerie-ts
  galerie-ts:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: galerie
    environment:
      - TS_EXTRA_ARGS=--advertise-tags=tag:server
      - TS_STATE_DIR=/var/lib/tailscale
    env_file:
      - /home/nixos/env-tailscale
    volumes:
      - galerie-ts:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # postgres
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=galerie
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=galerie
    volumes:
      - postgres:/var/lib/postgresql/data
    network_mode: service:postgres-ts
  postgres-ts:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: galerie-postgres
    environment:
      - TS_EXTRA_ARGS=--advertise-tags=tag:server
      - TS_STATE_DIR=/var/lib/tailscale
    env_file:
      - /home/nixos/env-tailscale
    volumes:
      - postgres-ts:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    labels:
      - com.centurylinklabs.watchtower.enable=true
  postgres-backup:
    image: ghcr.io/sekai-soft/postgres-backup-s3:15
    restart: unless-stopped
    env_file:
      - env-backup
      - /home/nixos/env-backup
    environment:
      S3_PREFIX: 'galerie'
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: 7
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: galerie
      POSTGRES_USER: galerie
      POSTGRES_PASSWORD: secret

  # miniflux
  miniflux:
    image: miniflux/miniflux:2.2.16
    restart: unless-stopped
    depends_on:
      miniflux-postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://miniflux:secret@miniflux-postgres/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - PORT=80
      - BASE_URL=http://miniflux/
      - WORKER_POOL_SIZE=1
      - MEDIA_PROXY_CUSTOM_URL=http://galerie-reader-media
      - MEDIA_PROXY_RESOURCE_TYPES=image,audio,video
    env_file:
      - env
    network_mode: service:miniflux-ts
  miniflux-ts:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: miniflux
    environment:
      - TS_EXTRA_ARGS=--advertise-tags=tag:server
      - TS_STATE_DIR=/var/lib/tailscale
    env_file:
      - /home/nixos/env-tailscale
    volumes:
      - miniflux-ts:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    labels:
      - com.centurylinklabs.watchtower.enable=true

  miniflux-postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=miniflux
    volumes:
      - miniflux-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "miniflux"]
      interval: 10s
      start_period: 30s
  miniflux-postgres-backup:
    image: ghcr.io/sekai-soft/postgres-backup-s3:15
    restart: unless-stopped
    env_file:
      - env-backup-miniflux
      - /home/nixos/env-backup
    environment:
      S3_PREFIX: 'galerie-miniflux'
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: 7
      POSTGRES_HOST: miniflux-postgres
      POSTGRES_DATABASE: miniflux
      POSTGRES_USER: miniflux
      POSTGRES_PASSWORD: secret

volumes:
  galerie-ts:
  postgres:
  postgres-ts:
  miniflux-ts:
  miniflux-postgres:
